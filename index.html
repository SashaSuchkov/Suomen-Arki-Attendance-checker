<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Вход - Посещаемость Suomen Arki</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="css/style.css" rel="stylesheet">
</head>
<body class="login-page">

<div class="container">
  <div class="row justify-content-center">
    <div class="col-12 col-sm-8 col-md-5 col-lg-4">

      <div class="card login-card shadow-sm">
        <div class="card-body p-4 p-md-5">

          <div class="text-center mb-4">
            <div class="brand-badge mb-2">Посещаемость</div>
            <h1 class="h4 mb-1">Вход для преподавателей</h1>
            <p class="text-muted small mb-0">Введите данные, которые вам выдал администратор</p>
          </div>

          <form id="login-form" novalidate>
            <div class="mb-3">
              <label for="email" class="form-label">Email</label>
              <input type="email" class="form-control" id="email" required autocomplete="username">
            </div>
            <div class="mb-3">
              <label for="password" class="form-label">Пароль</label>
              <input type="password" class="form-control" id="password" required autocomplete="current-password">
            </div>

            <div id="login-error" class="alert alert-danger py-2 small d-none" role="alert"></div>

            <button type="submit" class="btn btn-primary w-100" id="login-btn">
              <span id="login-btn-text">Войти</span>
              <span id="login-spinner" class="spinner-border spinner-border-sm ms-2 d-none" role="status" aria-hidden="true"></span>
            </button>
          </form>

        </div>
      </div>

      <p class="text-center text-muted small mt-3 mb-0">
        Забыли пароль? Обратитесь к администратору организации.
      </p>

    </div>
  </div>
</div>

<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
<script src="js/firebase-config.js"></script>
<script src="js/auth.js"></script>
</body>
</html>
