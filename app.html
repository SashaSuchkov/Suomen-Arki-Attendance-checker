<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Suomen Arki Attendance</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="css/style.css" rel="stylesheet">
</head>
<body>

<nav class="navbar navbar-app">
  <div class="container">
    <span class="navbar-brand mb-0">
      Attendance - <span id="group-name" class="fw-semibold">...</span>
    </span>
    <div class="d-flex align-items-center gap-2">
      <span id="teacher-email" class="text-muted small d-none d-sm-inline"></span>
      <button id="logout-btn" class="btn btn-outline-secondary btn-sm">Log out</button>
    </div>
  </div>
</nav>

<div class="container py-4">

  <div id="loading-block" class="text-center py-5">
    <div class="spinner-border text-primary" role="status"></div>
    <p class="text-muted mt-2">Loading...</p>
  </div>

  <div id="no-group-block" class="alert alert-warning d-none">
    Your account doesn't have a group linked to it. Please contact the admin.
  </div>

  <div id="main-block" class="d-none">

    <div class="card shadow-sm mb-4">
      <div class="card-body">
        <div class="row g-3 align-items-end">
          <div class="col-12 col-md-4">
            <label for="lesson-date" class="form-label">Lesson date</label>
            <input type="date" id="lesson-date" class="form-control">
          </div>
          <div class="col-12 col-md-8">
            <label for="lesson-topic" class="form-label">Lesson topic <span class="text-muted small">(optional)</span></label>
            <input type="text" id="lesson-topic" class="form-control" placeholder="Enter the topic">
          </div>
        </div>
      </div>
    </div>

    <div class="card shadow-sm">
      <div class="card-body">
        <div class="d-flex justify-content-between align-items-center mb-3">
          <h2 class="h6 mb-0">Students</h2>
          <div class="btn-group btn-group-sm">
            <button type="button" id="mark-all-present" class="btn btn-outline-success">All attended</button>
            <button type="button" id="mark-all-absent" class="btn btn-outline-danger">All absent</button>
          </div>
        </div>

        <div id="students-list" class="list-group list-group-flush">
          <!-- сюда подставляются ученики -->
        </div>

        <div id="empty-students" class="text-muted small d-none">
          This group doesn't have any students. Please contact the admin.
        </div>
      </div>
    </div>

    <div class="d-flex justify-content-between align-items-center mt-4">
      <div id="save-status" class="small text-muted"></div>
      <button id="save-btn" class="btn btn-primary px-4">
        Save
        <span id="save-spinner" class="spinner-border spinner-border-sm ms-2 d-none" role="status" aria-hidden="true"></span>
      </button>
    </div>

  </div>

</div>

<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
<script src="js/firebase-config.js"></script>
<script src="js/app.js"></script>
</body>
</html>
